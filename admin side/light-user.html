<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - Quick Study Builder</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
if(sessionStorage.getItem("adminLoggedIn") !== "true"){
    window.location.href = "index.html";
}
function logout(){
    sessionStorage.removeItem("adminLoggedIn");
    window.location.href = "index.html";
}
</script>
  <style>

    :root{
      --primary-yellow:#ffeb3b;
      --primary-teal:#32c9c4;
      --primary-purple:#b081d2;
      --light-bg:#f9f9ff;
      --card-bg:#ffffff;
      --text-dark:#2d3748;
      --soft-shadow:0 8px 24px rgba(0,0,0,0.08);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:linear-gradient(to bottom right,white,#f3e8ff);
      color:var(--text-dark);
      overflow-x:hidden;
    }
.top-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:85px;
  background:var(--primary-purple);
  box-shadow:var(--soft-shadow);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  z-index:1000;
}

.header-logo{
  font-size:28px;
  font-weight:700;
  color:var(--primary-teal);
}

.header-nav{
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-item{
  text-decoration:none;
  color:var(--text-dark);
  font-weight:500;
  padding:12px 18px;
  border-radius:12px;
  transition:.3s;
}

.nav-item:hover,
.active-nav{
  background:linear-gradient(
      to right,
      var(--primary-teal),
      var(--primary-purple)
  );
  color:white;
}

.header-right{
  display:flex;
  align-items:center;
  gap:12px;
}

.logout-header-btn{
  border:none;
  padding:12px 18px;
  border-radius:12px;
  font-weight:600;
  color:white;
  background:linear-gradient(
      to right,
      var(--primary-yellow),
      var(--primary-teal)
  );
}
    /* MAIN CONTENT */

    .main-content{
  padding:35px;
  margin-top:50px;
}

    .page-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:20px;
      margin-bottom:30px;
    }

    .page-header h2{
      font-size:34px;
      font-weight:700;
      margin:0;
    }

    .page-header p{
      color:#718096;
      margin-top:5px;
    }

    /* CARD */

    .card-box{
      background:var(--card-bg);
      border-radius:24px;
      padding:25px;
      box-shadow:var(--soft-shadow);
    }

    /* TOP BAR */

    .table-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:15px;
      margin-bottom:25px;
    }

    .table-top h4{
      margin:0;
      font-weight:700;
    }

    /* BUTTONS */

    .add-btn{
      border:none;
      padding:12px 22px;
      border-radius:14px;
      font-weight:600;
      background:linear-gradient(to right,var(--primary-teal),var(--primary-purple));
      color:white;
      transition:0.3s;
    }

    .add-btn:hover{
      transform:translateY(-3px);
    }

    .edit-btn{
      border:none;
      padding:8px 16px;
      border-radius:10px;
      background:var(--primary-teal);
      color:var(--text-dark);
      font-weight:600;
      margin-right:8px;
    }

    .delete-btn{
      border:none;
      padding:8px 16px;
      border-radius:10px;
      background:var(--primary-teal);
      color:black;
      font-weight:600;
    }

    /* TABLE */

    .custom-table{
      overflow-x:auto;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0 14px;
    }

    thead tr{
      background:transparent;
    }

    thead th{
      padding:14px;
      color:#718096;
      font-weight:600;
      border:none;
    }

    tbody tr{
      background:#f8fafc;
      box-shadow:0 4px 10px rgba(0,0,0,0.03);
      border-radius:14px;
    }

    tbody td{
      padding:18px 14px;
      vertical-align:middle;
      border:none;
      color:var(--text-dark);
      font-weight:500;
    }

    tbody tr td:first-child{
      border-top-left-radius:14px;
      border-bottom-left-radius:14px;
    }

    tbody tr td:last-child{
      border-top-right-radius:14px;
      border-bottom-right-radius:14px;
    }

    .role-badge{
      padding:6px 14px;
      border-radius:20px;
      font-size:13px;
      font-weight:600;
      display:inline-block;
    }

    .admin-role{
      background:rgba(176,129,210,0.15);
      color:var(--primary-purple);
    }

    .teacher-role{
      background:rgba(50,201,196,0.15);
      color:var(--primary-teal);
    }

    .student-role{
      background:rgba(255,235,59,0.25);
      color:#c49000;
    }

    /* RESPONSIVE */
@media(max-width:1200px){

  .top-header{
      flex-direction:column;
      height:auto;
      padding:15px;
      gap:15px;
  }

  .header-nav{
      flex-wrap:wrap;
      justify-content:center;
  }

  .main-content{
      margin-top:180px;
  }

}

@media(max-width:768px){

  .header-nav{
      gap:6px;
  }

  .nav-item{
      font-size:13px;
      padding:10px;
  }

}

  </style>
</head>

<body>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</body>
</html>
