<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved work — Quick Study Builder</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<body class="module-tool-page">

<div id="header"></div>

<section class="py-4">
  <div class="container">

      <div class="history-page-head">

      <p class="text-muted small mt-2 mb-3" id="historyPageHint">Click an item to open it.</p>
      <div id="historyPageList"></div>
    </div>
  </div>
</section>

<div id="footer"></div>
<script src="../../assets/js/header-footer.js"></script>
<script src="../../assets/js/api-config.js"></script>
