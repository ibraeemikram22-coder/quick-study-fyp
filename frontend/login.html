<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Quick Study Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/login.css">
<link rel="stylesheet" href="assets/css/auth-portal.css">
</head>
<body class="login-page">

<div id="backendStatus" class="login-backend-status" aria-live="polite"></div>

<div class="login-shell">
  <header class="login-brand">
    <h1 class="login-logo">Quick Study <span>Builder</span></h1>
    <p class="login-tagline">Smart learning tools for students and teachers</p>
  </header>

  <div class="login-card" id="userCard">
    <h2 class="login-title" id="formTitle">Welcome back</h2>
    <p class="login-sub" id="formSub">Sign in with your email to continue.</p>
    <p class="login-hint" id="liveHint">New on this site? Use <strong>Sign up</strong> — your old local account is not on the live server.</p>

    <div class="login-mode-tabs" id="userModeTabs">
      <button type="button" class="login-mode-btn active" id="tabLogin">Log in</button>
      <button type="button" class="login-mode-btn" id="tabSignup">Sign up</button>
    </div>

    <form class="login-form" id="loginForm" onsubmit="return false;" autocomplete="off">
      <div class="signup-fields" id="signupFields">
        <label class="login-label" for="signupName">Full name</label>
        <input type="text" id="signupName" class="login-input" placeholder="Your name" autocomplete="name">

        <div id="teacherSchoolWrap">
          <label class="login-label" for="signupSchool">School / college</label>
          <input type="text" id="signupSchool" class="login-input" placeholder="Institution name">
        </div>
      </div>

      <label class="login-label" for="authEmail">Email</label>
      <input type="email" id="authEmail" class="login-input" placeholder="Enter your email" autocomplete="off" spellcheck="false">

      <label class="login-label" for="authPassword">Password</label>
      <input type="password" id="authPassword" class="login-input" placeholder="Enter your password" autocomplete="new-password">

      <button type="submit" class="login-submit" id="mainActionBtn">Log in</button>
    </form>

    <p id="authMsg" class="login-msg" role="status"></p>
  </div>
</div>

<script src="assets/js/friendly-errors.js"></script>
<script src="assets/js/api-config.js"></script>
<script src="assets/js/auth-sso.js"></script>
<script src="assets/js/auth-session.js"></script>
<script src="assets/js/auth-portal.js"></script>
<script src="assets/js/login-page.js"></script>
</body>
</html>
